name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release --build-name=${{ github.event.inputs.version }} --build-number=${{ github.run_number }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build_windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows Installer
        run: dart run inno_bundle:build --release
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/installer/Release/*.exe

  build_macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Build macOS
        env:
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: "NO"
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: ""
        run: |
          flutter build macos --release \
            --build-name=${{ github.event.inputs.version }} \
            --build-number=${{ github.run_number }}
      - name: Ad-hoc sign macOS app
        run: |
          # Ad-hoc sign all frameworks and the app itself
          find build/macos/Build/Products/Release/freegosy.app/Contents/Frameworks -name "*.framework" -exec codesign --force --sign - {} + || true
          find build/macos/Build/Products/Release/freegosy.app/Contents/Frameworks -name "*.dylib" -exec codesign --force --sign - {} + || true
          codesign --force --sign - build/macos/Build/Products/Release/freegosy.app/Contents/MacOS/freegosy
          codesign --force --sign - build/macos/Build/Products/Release/freegosy.app
      - name: Create DMG
        run: |
          npx create-dmg build/macos/Build/Products/Release/freegosy.app --overwrite --no-code-sign
          mv *.dmg freegosy-macos.dmg
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: freegosy-macos.dmg

  release:
    name: Create Release
    needs: [build_android, build_windows, build_macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts/
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: artifacts/
      - name: Rename APK
        run: mv artifacts/app-release.apk artifacts/freegosy-android.apk
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            artifacts/freegosy-android.apk
            artifacts/*.exe
            artifacts/freegosy-macos.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
